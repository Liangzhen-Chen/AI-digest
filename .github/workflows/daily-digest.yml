name: Daily AI Digest

on:
  schedule:
    # 06:17 UTC
    # In London: 07:17 during BST, 06:17 during GMT
    # GitHub cron uses UTC, so this is not exactly 7:00 London time year-round.
    - cron: "17 6 * * *"

  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  send-digest:
    runs-on: ubuntu-latest

    steps:
      - name: Debug schedule timing
        run: |
          echo "event_name=${{ github.event_name }}"
          echo "event_schedule=${{ github.event.schedule }}"
          echo "utc_now=$(date -u)"
          echo "london_now=$(TZ=Europe/London date)"

      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run digest
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          SMTP_EMAIL: ${{ secrets.SMTP_EMAIL }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: python main.py

      # Persist product_history.json back to the repo
      # so future runs know which products were already featured
      - name: Commit product history
        run: |
          git config user.name "AI Digest Bot"
          git config user.email "bot@ai-digest"
          git add product_history.json
          git diff --cached --quiet || git commit -m "update product history [skip ci]"
          git push
